name: Weekly Trade Data Refresh

on:
  # Run every Sunday at 03:00 UTC (quiet time, APIs less congested)
  schedule:
    - cron: "0 3 * * 0"
  # Also allow manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch but do not commit)"
        required: false
        default: "false"

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to push data.json back to the repo

    steps:
      # ── Step A: Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step B: Set up Python ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests tqdm

      # ── Step C: Run the Fetcher ───────────────────────────────────────────
      # WTO and World Bank APIs are free/public — no key needed.
      # UN Comtrade free tier: 250 req/day. If you have a subscription key,
      # add it as a GitHub Secret (Settings → Secrets → COMTRADE_API_KEY)
      # and it will be passed as an environment variable.
      - name: Fetch trade data
        env:
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}   # Optional
        run: |
          python fetch_trade_data.py
        timeout-minutes: 25   # WTO + Comtrade calls with rate limiting ~15 min

      # ── Step D: Validate the output ───────────────────────────────────────
      - name: Validate data.json
        run: |
          python - << 'EOF'
          import json, sys
          with open("data.json") as f:
              d = json.load(f)
          assert "_meta" in d, "Missing _meta"
          assert "countries" in d, "Missing countries"
          n = len(d["countries"])
          assert n > 10, f"Too few countries: {n}"
          print(f"✓ data.json valid — {n} countries, generated {d['_meta']['generated']}")
          # Check a few key fields exist
          for iso, c in list(d["countries"].items())[:5]:
              assert "exports" in c, f"{iso} missing exports"
              assert "centroid" in c, f"{iso} missing centroid"
          print("✓ Spot-checks passed")
          EOF

      # ── Step E: Commit and push ───────────────────────────────────────────
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data.json
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: weekly trade data refresh — $(date -u +'%Y-%m-%d')"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "data.json unchanged — no commit needed"

      # ── Step F: Upload artifact (always, for inspection) ─────────────────
      - name: Upload data.json as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trade-data-${{ github.run_id }}
          path: data.json
          retention-days: 30
